{% extends 'base.html' %}

{% block content %}

<h1 class="title">
Edit Product
</h1>

<div class="form-box">

<form method="POST">

<label>Product Name</label>

<input
type="text"
name="name"
value="{{ product.name }}"
required>

<label>Price</label>

<input
type="number"
name="price"
value="{{ product.price }}"
required>

<label>Stock</label>

<input
type="number"
name="stock"
value="{{ product.stock }}"
required>

<label>Image Name</label>

<input
type="text"
name="image"
value="{{ product.image }}"
required>

<br><br>

<button
type="submit"
class="save-btn">

Update Product

</button>

<a href="/"
class="cancel-btn">

Cancel

</a>

</form>

</div>

{% endblock %}
