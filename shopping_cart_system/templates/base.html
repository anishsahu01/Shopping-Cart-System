<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>Shopping Cart System</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<header>

    <div class="logo">
        🛒 Shopping Cart System
    </div>

    <nav>

        <a href="/">Dashboard</a>

        <a href="/add_product">Add Product</a>

        <a href="/cart">
            Cart
            {% if cart_count %}
                ({{ cart_count }})
            {% endif %}
        </a>

    </nav>

</header>

<div class="container">

{% block content %}

{% endblock %}

</div>

<footer>

    © 2026 Shopping Cart System | Developed by Anish Sahu

</footer>

</body>
</html>
